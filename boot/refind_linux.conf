# refind kernel command line for Xiaomi Raphael (Redmi K20 Pro).
#
# Vendor boot logo (plymouth) with a clean ABL -> animation handover:
#   - console=ttyMSM0,115200 : kernel/initramfs logs go to the UART ONLY, so
#     none of them are painted onto the panel (no "recovering journal", driver
#     logs, etc. on screen). Do NOT add console=tty0 or the logs come back.
#   - splash                 : enables plymouth.
#   - plymouth.ignore-serial-consoles : draw the splash even though the only
#     kernel console is a serial port.
#   - loglevel=0 / *.show_status=0 / *.log_priority=0 : keep it all quiet.
#   - dtb=... : load vendor DTB (patched .mdt firmware paths). Without this,
#     Linux keeps U-Boot's FDT (.mbn paths) → ADSP/modem/SLPI/WiFi broken.
"Boot with standard options"  "root=UUID=ee8d3593-59b1-480e-a3b6-4fefb17ee7d8 rw console=ttyMSM0,115200 splash loglevel=0 plymouth.ignore-serial-consoles vt.global_cursor_default=0 rd.systemd.show_status=0 systemd.show_status=0 rd.udev.log_priority=0 udev.log_priority=0 dtb=\dtbs\qcom\sm8150-xiaomi-raphael.dtb"
