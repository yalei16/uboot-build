      # ==================== 修改开始：release 步骤（files 改为上传所有文件） ====================
      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-info.outputs.tag }}
          name: ${{ steps.release-info.outputs.name }}
          body: ${{ steps.description.outputs.body }}
          draft: false
          prerelease: false
          files: release-files/*        # 上传所有文件（卡刷包 .zip 及拆分分卷 .part*）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # ==================== 修改结束 ====================